---
name: HACS Validation

on:
  push:
    branches: ["main", "master"]
  pull_request:
  schedule:
    # Run daily to catch upstream breakage in HACS/hassfest validators
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # HACS custom repository validation
  # Checks that the integration meets all HACS requirements
  # ------------------------------------------------------------------
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  # ------------------------------------------------------------------
  # Home Assistant hassfest validation
  # Validates the integration against HA core requirements
  # (manifest, config flow, translations, etc.)
  # ------------------------------------------------------------------
  hassfest:
    name: Hassfest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
